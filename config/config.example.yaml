app:
  name: techmind
  mode: local   # local / dev / prod

server:
  addr: ":8080"
  trustedProxies: ["127.0.0.1", "::1"]

log:
  level: debug
  filename: logs/techmind.log
  maxSize: 64
  maxAge: 30
  maxBackups: 10

mysql:
  dsn: "techmind:your-password@tcp(127.0.0.1:3306)/techmind?parseTime=true&charset=utf8mb4&loc=Local"
  maxOpen: 20
  maxIdle: 10
  maxLifetime: 300

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0

jwt:
  secret: "" # local 模式为空时自动生成临时密钥；其他环境必须通过 TECHMIND_JWT_SECRET 注入
  accessExpireMin: 60
  refreshExpireH: 168

milvus:
  addr: "localhost:19530"
  collectionName: "techmind_articles"
  dim: 1536

ai:
  llmBaseURL: "https://api.deepseek.com/v1"
  llmApiKey: "" # 推荐通过 TECHMIND_AI_LLM_API_KEY 环境变量注入
  llmModel: "deepseek-chat"
  embeddingApiKey: "" # 推荐通过 TECHMIND_AI_EMBEDDING_API_KEY 环境变量注入
  embeddingModel: "ep-your-endpoint-id"
  timeoutSec: 30
  maxConcurrency: 5

monitor:
  prometheusURL: "http://127.0.0.1:9090"

alert:
  webhookToken: "" # 通过 TECHMIND_ALERT_WEBHOOK_TOKEN 注入

ops:
  autoDiagnose: true
  diagnoseTimeoutSec: 120
  evidenceWindowMin: 30

rateLimit:
  enabled: true
  requestsPerMin: 60
