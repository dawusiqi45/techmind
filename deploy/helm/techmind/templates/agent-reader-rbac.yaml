{{- if .Values.worker.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "techmind.fullname" . }}-agent-reader
  labels:
    {{- include "techmind.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "techmind.fullname" . }}-agent-reader
  labels:
    {{- include "techmind.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "techmind.fullname" . }}-agent-reader
  labels:
    {{- include "techmind.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "techmind.fullname" . }}-agent-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "techmind.fullname" . }}-agent-reader
{{- end }}
