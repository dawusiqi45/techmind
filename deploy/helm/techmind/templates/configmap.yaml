apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "techmind.fullname" . }}-config
  labels:
    {{- include "techmind.labels" . | nindent 4 }}
data:
  config.yaml: |
    app:
      name: techmind
      mode: prod
    server:
      addr: ":8080"
    log:
      level: info
      filename: logs/techmind.log
      maxSize: 64
      maxAge: 30
      maxBackups: 10
    mysql:
      {{- if .Values.mysql.enabled }}
      dsn: "{{ .Values.mysql.user }}:{{ .Values.mysql.password }}@tcp({{ .Values.mysql.host }}:{{ .Values.mysql.port }})/{{ .Values.mysql.database }}?parseTime=true&charset=utf8mb4&loc=Local"
      {{- else if .Values.externalMySQL.enabled }}
      dsn: "{{ .Values.externalMySQL.user }}:{{ .Values.externalMySQL.password }}@tcp({{ .Values.externalMySQL.host }}:{{ .Values.externalMySQL.port }})/{{ .Values.externalMySQL.database }}?parseTime=true&charset=utf8mb4&loc=Local"
      {{- end }}
      maxOpen: 20
      maxIdle: 10
      maxLifetime: 300
    redis:
      {{- if .Values.redis.enabled }}
      addr: "{{ .Values.redis.host }}:{{ .Values.redis.port }}"
      password: "{{ .Values.redis.password }}"
      db: {{ .Values.redis.db }}
      {{- else if .Values.externalRedis.enabled }}
      addr: "{{ .Values.externalRedis.host }}:{{ .Values.externalRedis.port }}"
      password: "{{ .Values.externalRedis.password }}"
      db: {{ .Values.externalRedis.db }}
      {{- end }}
    milvus:
      {{- if .Values.milvus.enabled }}
      addr: "{{ .Values.milvus.host }}:{{ .Values.milvus.port }}"
      {{- else if .Values.externalMilvus.enabled }}
      addr: "{{ .Values.externalMilvus.host }}:{{ .Values.externalMilvus.port }}"
      {{- else }}
      addr: ""
      {{- end }}
      collectionName: "techmind_articles"
      dim: 1536
    jwt:
      secret: "change-me-in-production"
      accessExpireMin: 60
      refreshExpireH: 168
    ai:
      llmBaseURL: {{ .Values.ai.llmBaseURL | quote }}
      llmApiKey: ""
      llmModel: {{ .Values.ai.llmModel | quote }}
      embeddingApiKey: ""
      embeddingModel: {{ .Values.ai.embeddingModel | quote }}
      timeoutSec: {{ .Values.ai.timeoutSec }}
      maxConcurrency: {{ .Values.ai.maxConcurrency }}
    monitor:
      prometheusURL: "http://prometheus:9090"
    alert:
      webhookToken: ""
    ops:
      autoDiagnose: {{ .Values.ops.autoDiagnose }}
      diagnoseTimeoutSec: {{ .Values.ops.diagnoseTimeoutSec }}
      evidenceWindowMin: {{ .Values.ops.evidenceWindowMin }}
    rateLimit:
      enabled: true
      requestsPerMin: 60
