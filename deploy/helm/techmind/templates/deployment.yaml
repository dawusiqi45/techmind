{{/* Server Deployment */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "techmind.fullname" . }}-server
  labels:
    {{- include "techmind.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      {{- include "techmind.server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "techmind.server.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: server
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          command: ["/app/techmind-server"]
          args: ["-config", "/app/config/config.yaml"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.server.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.server.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          env:
            - name: TECHMIND_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "techmind.fullname" . }}-secret
                  key: jwt-secret
            - name: TECHMIND_AI_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "techmind.fullname" . }}-secret
                  key: llm-api-key
            - name: TECHMIND_AI_EMBEDDING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "techmind.fullname" . }}-secret
                  key: embedding-api-key
            - name: TECHMIND_ALERT_WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "techmind.fullname" . }}-secret
                  key: alert-webhook-token
            {{- with .Values.server.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "techmind.fullname" . }}-config
---
{{/* Worker Deployment */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "techmind.fullname" . }}-worker
  labels:
    {{- include "techmind.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "techmind.worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "techmind.worker.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          command: ["/app/techmind-worker"]
          args: ["-config", "/app/config/config.yaml"]
          ports:
            - name: metrics
              containerPort: 9091
              protocol: TCP
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          env:
            - name: TECHMIND_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "techmind.fullname" . }}-secret
                  key: jwt-secret
            - name: TECHMIND_AI_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "techmind.fullname" . }}-secret
                  key: llm-api-key
            - name: TECHMIND_AI_EMBEDDING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "techmind.fullname" . }}-secret
                  key: embedding-api-key
            - name: TECHMIND_ALERT_WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "techmind.fullname" . }}-secret
                  key: alert-webhook-token
            {{- with .Values.worker.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "techmind.fullname" . }}-config
