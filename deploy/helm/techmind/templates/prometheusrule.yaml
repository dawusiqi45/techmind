{{- if .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "techmind.fullname" . }}-rules
  labels:
    {{- include "techmind.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  groups:
    - name: techmind-api
      interval: 30s
      rules:
        - alert: APIHighErrorRate
          expr: |
            (
              sum(rate(http_errors_total[5m]))
              /
              sum(rate(http_requests_total[5m]))
            ) > 0.05
          for: 5m
          labels:
            severity: critical
            service: techmind-server
          annotations:
            summary: "API 5xx 错误率超过 5%"
            description: "TechMind API 错误率为 {{ $value | humanizePercentage }}，持续5分钟"

        - alert: APILatencyHigh
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
            ) > 1.0
          for: 5m
          labels:
            severity: warning
            service: techmind-server
          annotations:
            summary: "API P95 延迟超过 1s"
            description: "TechMind API P95 延迟为 {{ $value }}s，持续5分钟"

        - alert: SlowRequestSpike
          expr: rate(slow_requests_total[5m]) > 0.5
          for: 3m
          labels:
            severity: warning
            service: techmind-server
          annotations:
            summary: "慢请求数量突增"
            description: "慢请求速率为 {{ $value }}/s，持续3分钟"

    - name: techmind-cache
      interval: 30s
      rules:
        - alert: CacheHitRateLow
          expr: |
            (
              sum(rate(cache_hit_total[5m]))
              /
              (
                sum(rate(cache_hit_total[5m]))
                +
                sum(rate(cache_miss_total[5m]))
              )
            ) < 0.6
          for: 5m
          labels:
            severity: warning
            service: techmind-server
          annotations:
            summary: "缓存命中率低于 60%"
            description: "缓存命中率为 {{ $value | humanizePercentage }}，持续5分钟"

    - name: techmind-redis-stream
      interval: 30s
      rules:
        - alert: RedisStreamBacklogHigh
          expr: redis_stream_pending_total > 100
          for: 3m
          labels:
            severity: warning
            service: techmind-worker
          annotations:
            summary: "Redis Stream 队列积压超过 100"
            description: "AI/诊断任务 pending 数量为 {{ $value }}，持续3分钟"

        - alert: WorkerConsumeLagHigh
          expr: |
            histogram_quantile(0.95,
              sum(rate(redis_stream_consume_duration_seconds_bucket[5m])) by (le)
            ) > 60
          for: 3m
          labels:
            severity: warning
            service: techmind-worker
          annotations:
            summary: "Worker 消费延迟超过 60s"
            description: "Worker 消费 P95 延迟为 {{ $value }}s，持续3分钟"

    - name: techmind-ai
      interval: 30s
      rules:
        - alert: AICallFailureHigh
          expr: |
            (
              sum(rate(ai_call_errors_total[5m]))
              /
              sum(rate(ai_calls_total[5m]))
            ) > 0.1
          for: 5m
          labels:
            severity: critical
            service: techmind-server
          annotations:
            summary: "AI 调用失败率超过 10%"
            description: "AI 调用失败率为 {{ $value | humanizePercentage }}，持续5分钟"

        - alert: AICallLatencyHigh
          expr: |
            histogram_quantile(0.95,
              sum(rate(ai_call_duration_seconds_bucket[5m])) by (le)
            ) > 10
          for: 3m
          labels:
            severity: warning
            service: techmind-server
          annotations:
            summary: "AI 调用延迟 P95 超过 10s"
            description: "AI 调用 P95 延迟为 {{ $value }}s，持续3分钟"

    - name: techmind-milvus
      interval: 30s
      rules:
        - alert: MilvusSearchLatencyHigh
          expr: |
            histogram_quantile(0.95,
              sum(rate(milvus_search_duration_seconds_bucket[5m])) by (le)
            ) > 0.5
          for: 5m
          labels:
            severity: warning
            service: techmind-server
          annotations:
            summary: "Milvus 搜索延迟 P95 超过 500ms"
            description: "Milvus 搜索 P95 延迟为 {{ $value }}s，持续5分钟"

        - alert: MilvusSearchErrorHigh
          expr: rate(milvus_search_errors_total[5m]) > 0.1
          for: 3m
          labels:
            severity: warning
            service: techmind-server
          annotations:
            summary: "Milvus 搜索错误率突增"
            description: "Milvus 搜索错误速率为 {{ $value }}/s，持续3分钟"

    - name: techmind-ops
      interval: 30s
      rules:
        - alert: OpsDiagnoseDurationHigh
          expr: |
            histogram_quantile(0.95,
              sum(rate(ops_diagnose_duration_seconds_bucket[5m])) by (le)
            ) > 120
          for: 5m
          labels:
            severity: warning
            service: techmind-worker
          annotations:
            summary: "诊断报告生成耗时 P95 超过 120s"
            description: "SRE Agent 诊断报告生成 P95 耗时为 {{ $value }}s，持续5分钟"
{{- end }}
