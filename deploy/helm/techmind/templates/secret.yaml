apiVersion: v1
kind: Secret
metadata:
  name: {{ include "techmind.fullname" . }}-secret
  labels:
    {{- include "techmind.labels" . | nindent 4 }}
type: Opaque
stringData:
  # 数据库密码（建议通过 helm secrets 或外部 Vault 管理）
  mysql-password: "techmind"
  # JWT Secret
  jwt-secret: "change-me-in-production"
  # LLM API Key
  llm-api-key: "sk-xxx"
  # Embedding API Key
  embedding-api-key: "your-ark-api-key"
