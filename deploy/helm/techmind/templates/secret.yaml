{{- if or .Values.server.enabled .Values.worker.enabled }}
{{- if and (not .Values.mysql.enabled) (not .Values.externalMySQL.enabled) }}
{{- fail "either mysql.enabled or externalMySQL.enabled must be true" }}
{{- end }}
{{- if and (not .Values.redis.enabled) (not .Values.externalRedis.enabled) }}
{{- fail "either redis.enabled or externalRedis.enabled must be true" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "techmind.fullname" . }}-secret
  labels:
    {{- include "techmind.labels" . | nindent 4 }}
type: Opaque
stringData:
  # JWT Secret
  jwt-secret: {{ required "secrets.jwtSecret is required" .Values.secrets.jwtSecret | quote }}
  # LLM API Key
  llm-api-key: {{ .Values.secrets.llmApiKey | quote }}
  # Embedding API Key
  embedding-api-key: {{ .Values.secrets.embeddingApiKey | quote }}
  # Alertmanager Webhook Token
  alert-webhook-token: {{ .Values.secrets.alertWebhookToken | quote }}
{{ if .Values.secrets.mysqlDSN }}
  mysql-dsn: {{ .Values.secrets.mysqlDSN | quote }}
{{ else if .Values.mysql.enabled }}
  mysql-dsn: {{ printf "%s:%s@tcp(%s:%v)/%s?parseTime=true&charset=utf8mb4&loc=Local" .Values.mysql.user .Values.mysql.password .Values.mysql.host .Values.mysql.port .Values.mysql.database | quote }}
{{ else }}
  mysql-dsn: {{ printf "%s:%s@tcp(%s:%v)/%s?parseTime=true&charset=utf8mb4&loc=Local" .Values.externalMySQL.user .Values.externalMySQL.password (required "externalMySQL.host is required" .Values.externalMySQL.host) .Values.externalMySQL.port .Values.externalMySQL.database | quote }}
{{ end }}
{{ if .Values.secrets.redisPassword }}
  redis-password: {{ .Values.secrets.redisPassword | quote }}
{{ else if .Values.redis.enabled }}
  redis-password: {{ .Values.redis.password | quote }}
{{ else }}
  redis-password: {{ .Values.externalRedis.password | quote }}
{{ end }}
{{- end }}
