apiVersion: v1
kind: Service
metadata:
  name: {{ include "techmind.fullname" . }}-worker
  labels:
    {{- include "techmind.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  ports:
    - port: 9091
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "techmind.worker.selectorLabels" . | nindent 4 }}
