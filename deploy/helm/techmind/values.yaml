# 默认 values 文件
# 可通过 helm install techmind ./deploy/helm/techmind -f my-values.yaml 覆盖

# ========== 全局配置 ==========
nameOverride: ""
fullnameOverride: ""

image:
  repository: techmind
  tag: "latest"
  pullPolicy: IfNotPresent

# ========== Server 配置 ==========
server:
  enabled: true
  replicaCount: 2

  image:
    repository: techmind
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080

  ingress:
    enabled: false
    className: "nginx"
    annotations: {}
    hosts:
      - host: techmind.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  livenessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /readyz
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 3

  env: []

# ========== Worker 配置 ==========
worker:
  enabled: true
  replicaCount: 1

  image:
    repository: techmind
    tag: "latest"
    pullPolicy: IfNotPresent

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  env: []

# ========== Frontend 配置 ==========
frontend:
  enabled: true
  replicaCount: 1

  image:
    repository: techmind-frontend
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: NodePort
    port: 80
    targetPort: 80
    nodePort: 30000

  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# ========== HPA 配置 ==========
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ========== 服务监控 ==========
serviceMonitor:
  enabled: true
  interval: 15s
  path: /metrics

# ========== PrometheusRule 告警规则 ==========
prometheusRule:
  enabled: true

# ========== 数据库依赖（集群内部或外部） ==========
mysql:
  enabled: false
  host: "mysql"
  port: 3306
  database: "techmind"
  user: "techmind"
  password: "techmind"

redis:
  enabled: false
  host: "redis"
  port: 6379
  password: ""
  db: 0

milvus:
  enabled: false
  host: "techmind-milvus"
  port: 19530

# ========== 外部配置 ==========
externalMySQL:
  enabled: true
  host: ""
  port: 3306
  database: "techmind"
  user: ""
  password: ""

externalRedis:
  enabled: true
  host: ""
  port: 6379
  password: ""
  db: 0

externalMilvus:
  enabled: true
  host: ""
  port: 19530
