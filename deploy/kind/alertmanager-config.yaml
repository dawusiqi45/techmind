---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: techmind
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: 'techmind-webhook'
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
    receivers:
      - name: 'techmind-webhook'
        webhook_configs:
          - url: 'http://techmind-server:8080/api/v1/admin/alerts/webhook'
            send_resolved: true
    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'service']
