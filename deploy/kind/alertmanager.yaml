---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: techmind
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: webhook-secret
              mountPath: /etc/alertmanager/secrets
              readOnly: true
          args:
            - '--config.file=/etc/alertmanager/alertmanager.yml'
            - '--storage.path=/alertmanager'
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: webhook-secret
          secret:
            secretName: techmind-alertmanager-webhook
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: techmind
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
