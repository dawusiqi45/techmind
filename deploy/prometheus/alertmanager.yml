global:
  resolve_timeout: 5m

route:
  receiver: 'techmind-webhook'
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h

receivers:
  - name: 'techmind-webhook'
    webhook_configs:
      - url: 'http://techmind-server:8080/api/v1/alerts/webhook'
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials: 'techmind-compose-alert-webhook'
          timeout: 10s

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']
